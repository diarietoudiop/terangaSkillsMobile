name: teranga_skills
description: "TerangaSkills - Plateforme Numérique de Gouvernance Territoriale"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI & Navigation
  get: ^4.7.2
  get_storage: ^2.1.1

  # HTTP Client
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # Local Storage / Cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Image & File Handling
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # QR Code
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Maps & Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Charts & Analytics
  fl_chart: ^1.2.0

  # UI Components
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  timeago: ^3.7.0

  # Connectivity
  connectivity_plus: ^7.1.1

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

  # Permissions
  permission_handler: ^12.0.3

  # PDF / Document
  open_filex: ^4.4.0

  # Google Fonts
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/


